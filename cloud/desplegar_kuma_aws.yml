---
- name: Desplegar Uptime Kuma en instancia EC2 AWS
  hosts: aws
  become: yes
  gather_facts: no

  tasks:
    - name: Esperar conexion SSH con la instancia
      wait_for_connection:
        timeout: 300
        delay: 15

    - name: Recolectar informacion del sistema
      setup:

    - name: Actualizar cache de paquetes
      apt:
        update_cache: yes

    - name: Instalar Docker y Docker Compose
      apt:
        name:
          - docker.io
          - docker-compose
        state: present

    - name: Iniciar y habilitar Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Crear directorio para Uptime Kuma
      file:
        path: /opt/uptime-kuma
        state: directory
        mode: '0755'

    - name: Copiar archivo docker-compose.yml
      copy:
        src: ../docker/docker-compose.yml
        dest: /opt/uptime-kuma/docker-compose.yml
        mode: '0644'

    - name: Levantar contenedor Uptime Kuma
      command: docker-compose up -d
      args:
        chdir: /opt/uptime-kuma

    - name: Verificar contenedores activos
      command: docker ps
      register: contenedores
      changed_when: false

    - name: Mostrar contenedores activos
      debug:
        var: contenedores.stdout_lines